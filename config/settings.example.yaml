# Example interceptor settings. Copy to a real location and pass with -f.
debug: false

# Port the interceptor listens on (behind Traefik).
listenPort: 8080

# Fallback upstream when a model's upstream can't be resolved from the
# registry. In the walking-skeleton phase this is the single engine/router URL.
# May point at an engine directly (Shape A) or at a router (Shape B) — the
# interceptor behaves identically either way.
defaultUpstream: "http://localhost:8000"

# Long idle timeout: token streams can idle between chunks.
idleTimeout: "10m"

# Explicit policy: whether a client-aborted request still bills its partial
# token count.
billPartialOnAbort: true

# Model → upstream dispatch (M4).
registry:
  # static     — always use defaultUpstream (above). Single-model / dev.
  # convention — derive the upstream from a Service-naming template; new models
  #              are reachable with no redeploy.
  # cached     — control-plane lookup with an LRU + TTL cache (lookup currently
  #              degrades to the convention template until the Atlas resource
  #              path is wired).
  # chain      — cached, falling back to convention if the lookup errors.
  strategy: "static"
  conventionTemplate: "http://model-{id}.inference.svc.cluster.local:8000"
  cacheSize: 4096
  cachePositiveTTL: "5m"
  cacheNegativeTTL: "10s"   # short, so a newly-created model is reachable fast

# Durable metering emit (M2). Valkey Streams hot path → local-disk WAL fallback
# → structured-log floor. Leave valkeyAddr empty to run WAL-only.
# walPath is a DIRECTORY (tidwall/wal segment log); the historical .jsonl name
# is kept on purpose — a pre-upgrade single-file JSONL WAL found at this exact
# path is auto-imported on startup and renamed aside to "<walPath>.imported".
emit:
  valkeyAddr: "localhost:6379"
  streamName: "phoebe:metering"
  walPath: "/var/lib/phoebe/metering-wal.jsonl"
